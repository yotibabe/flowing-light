<!-- REDESIGNED Philosophy Section: Two-Column Editorial Layout -->

<!-- Interactive Animations Scripts -->
<script>
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    gsap.registerPlugin(ScrollTrigger);
    const cursor = document.getElementById('cursor-glow');

    if (!prefersReducedMotion) {
        const lenis = new Lenis({
            duration: 1.5,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            smooth: true,
            smoothTouch: false,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
        lenis.on('scroll', ScrollTrigger.update);
    }

    if (!prefersReducedMotion && window.matchMedia("(min-width: 768px)").matches) {
        gsap.set(cursor, { xPercent: -50, yPercent: -50 });
        const moveCursorX = gsap.quickTo(cursor, "x", { duration: 0.8, ease: "power3.out" });
        const moveCursorY = gsap.quickTo(cursor, "y", { duration: 0.8, ease: "power3.out" });
        window.addEventListener('mousemove', (e) => {
            moveCursorX(e.clientX);
            moveCursorY(e.clientY);
        });
    }

    if (prefersReducedMotion) {
        document.querySelectorAll('.hero-text, .philosophy-left, .philosophy-right').forEach((element) => {
            element.style.opacity = '1';
            element.style.transform = 'none';
        });
    } else {
        const heroTimeline = gsap.timeline();
        heroTimeline.from(".hero-panel", {
            y: 40,
            opacity: 0,
            duration: 1.5,
            ease: "power3.out",
            delay: 0.1
        }).from(".hero-text", {
            y: 30,
            opacity: 0,
            duration: 1.2,
            stagger: 0.15,
            ease: "power3.out"
        }, "-=1.0");

        const philosophyTl = gsap.timeline({
            scrollTrigger: {
                trigger: "#philosophy-section",
                start: "top 70%",
                toggleActions: "play none none reverse"
            }
        });

        philosophyTl.to(".philosophy-left", {
            y: 0,
            opacity: 1,
            duration: 1.2,
            ease: "power3.out"
        }).to(".philosophy-right", {
            y: 0,
            opacity: 1,
            duration: 1.2,
            stagger: 0.3,
            ease: "power3.out"
        }, "-=0.6");

        gsap.to('.quote-parallax-bg', {
            scrollTrigger: {
                trigger: '.quote-parallax-bg',
                start: "top bottom",
                end: "bottom top",
                scrub: true,
            },
            y: "20%",
            ease: "none"
        });

        const quoteTl = gsap.timeline({
            scrollTrigger: {
                trigger: '.quote-reveal',
                start: "top 75%",
                toggleActions: "play none none reverse"
            }
        });

        quoteTl.fromTo('.quote-reveal > div:first-child',
            { height: 0, opacity: 0 },
            { height: "5rem", opacity: 1, duration: 1, ease: "power3.out" }
        ).fromTo('.quote-reveal p',
            { y: 20, opacity: 0, filter: "blur(5px)" },
            { y: 0, opacity: 1, filter: "blur(0px)", duration: 1.2, ease: "power2.out" },
            "-=0.5"
        ).fromTo('.quote-reveal h2',
            { y: 30, opacity: 0, filter: "blur(10px)" },
            { y: 0, opacity: 1, filter: "blur(0px)", duration: 2.5, ease: "power2.out" },
            "-=0.2"
        ).fromTo('.quote-reveal > div:last-child',
            { height: 0, opacity: 0 },
            { height: "5rem", opacity: 1, duration: 1, ease: "power3.out" },
            "-=1"
        );
    }
</script>
